<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 48" fill="none">
  <!-- Shell prompt style: ~/mpstaton $ -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@500;700');
    .prompt { font-family: 'Fira Code', monospace; font-size: 28px; font-weight: 500; }
    .name { font-family: 'Fira Code', monospace; font-size: 28px; font-weight: 700; }
  </style>
  <text x="4" y="34" class="prompt" fill="#64748b">~/</text>
  <text x="48" y="34" class="name" fill="#f1f5f9">mp</text>
  <text x="88" y="34" class="name" fill="#3b82f6">staton</text>
  <text x="210" y="34" class="prompt" fill="#f59e0b"> $</text>
  <rect x="248" y="8" width="2.5" height="28" rx="1" fill="#f59e0b" opacity="0.7"/>
</svg>
