<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 48" fill="none">
  <!-- Terminal-style: monospace with cursor blink -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700');
    .logo-text { font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 32px; font-weight: 700; letter-spacing: 2px; }
  </style>
  <text x="4" y="36" class="logo-text" fill="#f1f5f9">mpstat</text>
  <text x="196" y="36" class="logo-text" fill="#3b82f6">o</text>
  <text x="218" y="36" class="logo-text" fill="#f1f5f9">n</text>
  <!-- blinking cursor -->
  <rect x="244" y="8" width="3" height="32" rx="1" fill="#f59e0b">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
