<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 56" fill="none">
  <!-- Variable-name style: mp_staton with underscore highlight -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@600');
    .name { font-family: 'Fira Code', monospace; font-size: 30px; font-weight: 600; letter-spacing: 1px; }
  </style>
  <text x="4" y="34" class="name" fill="#60a5fa">mp</text>
  <text x="46" y="34" class="name" fill="#f59e0b">_</text>
  <text x="62" y="34" class="name" fill="#f1f5f9">staton</text>
  <!-- Underline accent beneath the underscore, extending subtly -->
  <rect x="46" y="42" width="18" height="2.5" rx="1" fill="#f59e0b"/>
</svg>
